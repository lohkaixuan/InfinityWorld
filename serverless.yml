service: infinityworld-api

provider:
    name: aws
    runtime: nodejs18.x
    region: ap-southeast-1
    environment:
        NODE_ENV: production

functions:
    bedrockChat:
        handler: api/bedrock-chat.handler
        events:
            - http:
                  path: /api/bedrock-chat
                  method: post
                  cors: true
